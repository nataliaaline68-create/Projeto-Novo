<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgendSaúde | Mutirão de Saúde Comunitária</title>
  <link rel="stylesheet" href="../css/voluntario.css">
  <script defer src="../js/voluntario.js"></script>

  <!-- Ícones -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
</head>
<body>
  <!-- HEADER -->
  <header class="banner">
      <!-- LOGO -->
      <a href="../index.html">
        <div class="logo">
          <img src="../img/Logo png.png" alt="Ícone AgendSaúde">
        </div>
       </a>
      <!-- TÍTULO -->
      <div class="titulo">
        <h1>Mutirão de saúde comunitária</h1>
        <p>Agendamento & organização</p>
      </div>
    <!-- PERFIL -->
    <a href="../pages/Login.html" class="perfil">
      <i class="bi bi-person"></i>
    </a>
  </header>
  <!-- CONTEÚDO PRINCIPAL -->
  <main>
    <div class="container">
      <h2>Cadastro de Voluntário</h2>
      <form>
          <label>Foto:</label>
          <input type="file" accept="image/*" onchange="previewFoto(event)">
          <img id="preview">
  
          <input type="text" placeholder="Nome completo" required>
          <input type="text" placeholder="Identidade" required>
          <input type="text" placeholder="CPF" required>
          <input type="email" placeholder="Email" required>
          <input type="tel" placeholder="Telefone" required>
          <input type="date" required>
  
          <label>Especialidade:</label>
          <select required>
            <option value="">Selecione</option>
            <option>Enfermeiros(a)</option>
            <option>Agente de saude</option>
            <option>Estudade</option>
         
          </select>
          <input type="text" placeholder="Conselho" required>
  
          <button type="submit">Cadastrar</button>
      </form>
  </div>
  </main>
  <!-- FOOTER -->
  <footer class="footer">
    <p>Siga-nos nas redes sociais</p>
    <div class="redes">
      <i class="bi bi-facebook"></i>
      <i class="bi bi-instagram"></i>
      <i class="bi bi-twitter"></i>
      <i class="bi bi-linkedin"></i>
      <i class="bi bi-youtube"></i>
    </div>
    <span>© 2026 AgendSaúde</span>
  </footer>

</body>
</html>
